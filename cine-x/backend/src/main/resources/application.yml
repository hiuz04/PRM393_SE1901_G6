spring:
  application:
    name: cine-x-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: 8080

app:
  api-prefix: /api/v1
  jwt:
    secret: ${JWT_SECRET:CineXLocalDevelopmentSecretKeyMustBeAtLeast32Chars}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  upload-dir: ${UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
