name: cine_x
description: CINE-X Flutter client for screenplay project management.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.2
  http_parser: ^4.0.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0
  path: ^1.9.1
  path_provider: ^2.1.5
  crypto: ^3.0.6
  fl_chart: ^0.69.0
  pdf: ^3.11.1
  printing: ^5.13.4
  intl: ^0.20.2
  mime: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoSans-Regular.ttf
